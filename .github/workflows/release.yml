name: Release Docker Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_image: debian:stable-slim
            dockerfile: ./Dockerfile
            variant: debian
          - base_image: ubuntu:22.04
            dockerfile: ./Dockerfile
            variant: ubuntu
          - base_image: alpine:latest
            dockerfile: ./Dockerfile.alpine
            variant: alpine

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push versioned Docker image to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            fugginold/adsb-feeder:${{ matrix.variant }}-${{ steps.version.outputs.version }}
            fugginold/adsb-feeder:${{ matrix.variant }}

      - name: Build Docker image locally for export (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          platforms: linux/amd64
          load: true
          tags: adsb-feeder:${{ matrix.variant }}-amd64

      - name: Export amd64 image as tarball
        run: |
          IMAGE_NAME="adsb-feeder-${{ matrix.variant }}-${{ steps.version.outputs.version }}-amd64"
          docker save adsb-feeder:${{ matrix.variant }}-amd64 | gzip > "${IMAGE_NAME}.tar.gz"
          echo "Exported ${IMAGE_NAME}.tar.gz ($(du -sh ${IMAGE_NAME}.tar.gz | cut -f1))"

      - name: Build Docker image locally for export (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          platforms: linux/arm64
          load: true
          tags: adsb-feeder:${{ matrix.variant }}-arm64

      - name: Export arm64 image as tarball
        run: |
          IMAGE_NAME="adsb-feeder-${{ matrix.variant }}-${{ steps.version.outputs.version }}-arm64"
          docker save adsb-feeder:${{ matrix.variant }}-arm64 | gzip > "${IMAGE_NAME}.tar.gz"
          echo "Exported ${IMAGE_NAME}.tar.gz ($(du -sh ${IMAGE_NAME}.tar.gz | cut -f1))"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: release-notes.md
          files: "adsb-feeder-${{ matrix.variant }}-${{ steps.version.outputs.version }}-*.tar.gz"
