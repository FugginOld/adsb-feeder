name: Docker Image Export

# Reusable workflow: called by release.yml after a tag is pushed.
# Can also be triggered manually (workflow_dispatch) to export images
# from any ref and optionally attach them to an existing GitHub Release.

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag to embed in filenames (e.g. v1.2.3)"
        required: true
        type: string
      upload_to_release:
        description: "Upload tarballs to the GitHub Release for this tag"
        required: false
        type: boolean
        default: true
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

  workflow_dispatch:
    inputs:
      version:
        description: "Version label for output filenames (e.g. v1.2.3 or edge)"
        required: true
        default: "edge"
      upload_to_release:
        description: "Upload tarballs to the GitHub Release for this tag (only meaningful for v* tags)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  export:
    name: Build & export ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - base_image: debian:stable-slim
            dockerfile: ./Dockerfile
            variant: debian
            is_default: true
          - base_image: ubuntu:22.04
            dockerfile: ./Dockerfile
            variant: ubuntu
            is_default: false
          - base_image: alpine:latest
            dockerfile: ./Dockerfile.alpine
            variant: alpine
            is_default: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── DockerHub push ────────────────────────────────────────────────────
      # Builds both platforms in one pass and pushes to the registry.
      # Tags:  <variant>-<version>  (e.g. debian-v1.2.3)
      #        <variant>            (e.g. debian  — latest for this variant)
      #        latest               (only on the default/debian variant)
      - name: Compute DockerHub tags
        id: tags
        run: |
          VERSION="${{ inputs.version }}"
          VARIANT="${{ matrix.variant }}"
          TAGS="fugginold/adsb-feeder:${VARIANT}-${VERSION}"$'\n'"fugginold/adsb-feeder:${VARIANT}"
          if [ "${{ matrix.is_default }}" = "true" ]; then
            TAGS="${TAGS}"$'\n'"fugginold/adsb-feeder:latest"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "${TAGS}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push to DockerHub (amd64 + arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      # ── Tarball export (amd64) ────────────────────────────────────────────
      - name: Build amd64 image for local export
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          platforms: linux/amd64
          load: true
          tags: export-image:${{ matrix.variant }}-amd64

      - name: Export amd64 tarball
        run: |
          NAME="adsb-feeder-${{ matrix.variant }}-${{ inputs.version }}-amd64.tar.gz"
          docker save export-image:${{ matrix.variant }}-amd64 | gzip > "${NAME}"
          echo "Created ${NAME} ($(du -sh ${NAME} | cut -f1))"

      # ── Tarball export (arm64) ────────────────────────────────────────────
      - name: Build arm64 image for local export
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          platforms: linux/arm64
          load: true
          tags: export-image:${{ matrix.variant }}-arm64

      - name: Export arm64 tarball
        run: |
          NAME="adsb-feeder-${{ matrix.variant }}-${{ inputs.version }}-arm64.tar.gz"
          docker save export-image:${{ matrix.variant }}-arm64 | gzip > "${NAME}"
          echo "Created ${NAME} ($(du -sh ${NAME} | cut -f1))"

      # ── Upload to GitHub Release ──────────────────────────────────────────
      - name: Upload tarballs to GitHub Release
        if: ${{ inputs.upload_to_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          files: "adsb-feeder-${{ matrix.variant }}-${{ inputs.version }}-*.tar.gz"

      # ── Upload as workflow artifact (manual runs) ─────────────────────────
      - name: Upload tarballs as workflow artifacts
        if: ${{ !inputs.upload_to_release }}
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ matrix.variant }}-${{ inputs.version }}
          path: "adsb-feeder-${{ matrix.variant }}-${{ inputs.version }}-*.tar.gz"
          retention-days: 7
